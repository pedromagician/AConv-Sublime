[ENCODINGS]
UTF-8 = utf-8
Win1250 = Central European (Windows 1250)
Win1251 = Cyrillic (Windows 1251)
Win1252 = Western (Windows 1252)
CP437 = DOS (CP 437)
8859-1 = Western (ISO 8859-1)
8859-2 = Central European (ISO 8859-2)
8859-3 = Western (ISO 8859-3)
8859-15 = Western (ISO 8859-15)
